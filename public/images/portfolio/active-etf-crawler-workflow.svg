<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Active ETF crawler notification workflow</title>
  <desc id="desc">Daily workflow that fetches 00981A holdings, stores a snapshot, compares it with the previous day, and sends notifications by email and Telegram.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef6f4"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f6f6b"/>
    </marker>
  </defs>
  <rect width="960" height="420" rx="24" fill="url(#bg)"/>
  <g fill="none" stroke="#2f6f6b" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)">
    <path d="M 185 160 H 285"/>
    <path d="M 435 160 H 535"/>
    <path d="M 685 160 H 785"/>
    <path d="M 585 220 C 585 292 660 306 730 306"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="54" y="100" width="132" height="120" rx="12" fill="#ffffff" stroke="#d9e6e2"/>
    <rect x="304" y="100" width="132" height="120" rx="12" fill="#ffffff" stroke="#d9e6e2"/>
    <rect x="554" y="100" width="132" height="120" rx="12" fill="#ffffff" stroke="#d9e6e2"/>
    <rect x="804" y="100" width="132" height="120" rx="12" fill="#ffffff" stroke="#d9e6e2"/>
    <rect x="730" y="246" width="176" height="120" rx="12" fill="#ffffff" stroke="#d9e6e2"/>
  </g>
  <g fill="#2f6f6b">
    <circle cx="120" cy="132" r="16"/>
    <path d="M112 160h16v34h-16zM101 172h38v12h-38z"/>
    <path d="M354 134h64v12h-64zM354 156h64v12h-64zM354 178h44v12h-44z"/>
    <path d="M614 130h12v64h-12zM588 154h12v40h-12zM640 146h12v48h-12z"/>
    <path d="M842 138h56v42h-56zM842 138l28 24 28-24"/>
    <path d="M801 282c22 0 40 14 40 32s-18 32-40 32-40-14-40-32 18-32 40-32zm-8 45 32-26-40 18-16-6z"/>
  </g>
  <g font-family="Inter, Arial, sans-serif" text-anchor="middle" fill="#173331">
    <text x="120" y="254" font-size="20" font-weight="700">GitHub Actions</text>
    <text x="120" y="282" font-size="15">daily schedule</text>
    <text x="370" y="254" font-size="20" font-weight="700">MoneyDJ</text>
    <text x="370" y="282" font-size="15">00981A holdings</text>
    <text x="620" y="254" font-size="20" font-weight="700">Snapshot diff</text>
    <text x="620" y="282" font-size="15">compare yesterday</text>
    <text x="870" y="254" font-size="20" font-weight="700">Email</text>
    <text x="870" y="282" font-size="15">summary alert</text>
    <text x="818" y="390" font-size="20" font-weight="700">Telegram</text>
  </g>
</svg>
